<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>怪獸塔爆爆冒險</title>
  <style>
    :root {
      --bg: #070b16;
      --panel: #0f1a30;
      --panel-border: #31466f;
      --accent: #38bdf8;
      --accent-2: #a78bfa;
      --good: #34d399;
      --warn: #f59e0b;
      --danger: #ef4444;
      --text: #f8fafc;
      --text-dim: #cbd5e1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: radial-gradient(circle at top, #16294a 0%, #0b1326 45%, var(--bg) 100%);
      color: var(--text);
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      padding: 10px;
    }

    .game-shell {
      width: min(100%, 980px);
      display: grid;
      gap: 10px;
      grid-template-rows: auto auto 1fr auto;
    }

    .title {
      text-align: center;
      font-size: clamp(1.3rem, 2.4vw, 1.8rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      margin: 2px 0 0;
      color: #fde68a;
      text-shadow: 0 2px 12px rgba(245, 158, 11, 0.35);
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .hud-item {
      background: linear-gradient(180deg, rgba(23, 37, 67, 0.94), rgba(13, 24, 45, 0.94));
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 8px;
      text-align: center;
      font-size: 0.9rem;
      line-height: 1.25;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 8px 16px rgba(2, 8, 23, 0.25);
    }

    .hud-item b {
      display: block;
      color: #fef08a;
      font-size: 1rem;
      margin-top: 2px;
    }

    .stage {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid #3f5a8f;
      background: #0f172a;
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 18px 34px rgba(1, 6, 18, 0.5), inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      outline: none;
      touch-action: none;
      background: radial-gradient(circle at center, #1a2c4a 0%, #101b30 100%);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(2, 8, 23, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 8;
      padding: 16px;
    }

    .dialog {
      width: min(92%, 560px);
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      box-shadow: 0 18px 38px rgba(2, 8, 23, 0.55);
    }

    .dialog h2 {
      margin: 0 0 8px;
      font-size: clamp(1.35rem, 4.6vw, 2rem);
      color: #fef08a;
    }

    .dialog p {
      margin: 8px 0;
      color: var(--text-dim);
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .cta {
      margin-top: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: white;
      font-weight: 800;
      font-size: 1rem;
      padding: 10px 18px;
      cursor: pointer;
    }

    .controls {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr auto;
      align-items: center;
      background: linear-gradient(180deg, rgba(23, 37, 67, 0.92), rgba(13, 24, 45, 0.92));
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 10px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .hint {
      font-size: 0.88rem;
      color: var(--text-dim);
      line-height: 1.45;
    }

    .hint b { color: #fde68a; }

    .bomb-btn {
      border: none;
      border-radius: 999px;
      width: 76px;
      aspect-ratio: 1;
      background: radial-gradient(circle at 32% 28%, #9ca3af 0%, #1f2937 70%);
      color: white;
      font-size: 1.55rem;
      font-weight: 800;
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.35);
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 0.14s ease, filter 0.14s ease;
    }

    .bomb-btn:active {
      transform: translateY(1px) scale(0.98);
      filter: brightness(1.08);
    }

    @media (max-width: 760px) {
      .hud {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <h1 class="title">怪獸塔爆爆冒險（10 關）</h1>

    <section class="hud">
      <div class="hud-item">關卡<b id="level">1 / 10</b></div>
      <div class="hud-item">分數<b id="score">0</b></div>
      <div class="hud-item">生命<b id="lives">❤️❤️❤️</b></div>
      <div class="hud-item">怪獸剩餘<b id="enemyCount">0</b></div>
    </section>

    <section class="stage">
      <canvas id="gameCanvas" tabindex="0"></canvas>
      <div class="overlay" id="overlay">
        <div class="dialog" id="dialog"></div>
      </div>
    </section>

    <section class="controls">
      <div class="hint">
        手機 / 網頁：<b>點擊可達目的地</b> 會用最短路徑自動移動，<b>連點兩下</b> 放炸彈。<br>
        若目標路徑被牆/磚/炸彈阻擋，角色會停留原地。<br>
        鍵盤：<b>方向鍵</b> 微調移動，<b>空白鍵</b> 放炸彈。
      </div>
      <button class="bomb-btn" id="bombButton" aria-label="放置炸彈">💣</button>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const overlay = document.getElementById('overlay');
    const dialog = document.getElementById('dialog');

    const levelEl = document.getElementById('level');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const enemyCountEl = document.getElementById('enemyCount');
    const bombBtn = document.getElementById('bombButton');

    const TILE = 0;
    const WALL = 1;
    const BRICK = 2;

    const MAP_COLS = 15;
    const MAP_ROWS = 13;
    const TILE_SIZE = 40;
    const BOMB_FUSE_MS = 3000;

    canvas.width = MAP_COLS * TILE_SIZE;
    canvas.height = MAP_ROWS * TILE_SIZE;

    const GAME_STATE = {
      START: 'START',
      PLAYING: 'PLAYING',
      LEVEL_CLEAR: 'LEVEL_CLEAR',
      GAME_OVER: 'GAME_OVER',
      GAME_WIN: 'GAME_WIN',
    };

    const ENEMY_THEMES = [
      { primary: '#fb7185', secondary: '#be123c', eye: '#fff1f2' },
      { primary: '#f59e0b', secondary: '#b45309', eye: '#fffbeb' },
      { primary: '#34d399', secondary: '#047857', eye: '#ecfdf5' },
      { primary: '#60a5fa', secondary: '#1d4ed8', eye: '#eff6ff' },
      { primary: '#a78bfa', secondary: '#6d28d9', eye: '#f5f3ff' },
      { primary: '#22d3ee', secondary: '#0e7490', eye: '#ecfeff' },
    ];

    function roundedRectPath(x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + w - radius, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
      ctx.lineTo(x + w, y + h - radius);
      ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
      ctx.lineTo(x + radius, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    let gameState = GAME_STATE.START;
    let level = 1;
    let score = 0;

    const playerStats = {
      lives: 3,
      speedTier: 1,
      bombCount: 1,
      bombRange: 1,
    };

    let map = [];
    let player = null;
    let enemies = [];
    let bombs = [];
    let explosions = [];
    let items = [];
    let exit = null;
    let destinationMarker = null;

    const input = { up: false, down: false, left: false, right: false, bomb: false };

    function getCanvasPointerPosition(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY,
      };
    }

    function toGrid(px, py) {
      return {
        x: Math.floor((px + TILE_SIZE / 2) / TILE_SIZE),
        y: Math.floor((py + TILE_SIZE / 2) / TILE_SIZE),
      };
    }

    function isWalkableTile(gx, gy) {
      if (gx < 0 || gy < 0 || gx >= MAP_COLS || gy >= MAP_ROWS) return false;
      if (map[gy][gx] === WALL || map[gy][gx] === BRICK) return false;
      if (bombs.some((b) => b.gx === gx && b.gy === gy)) return false;
      return true;
    }

    function findShortestPath(startX, startY, targetX, targetY) {
      if (startX === targetX && startY === targetY) return [];
      if (!isWalkableTile(targetX, targetY)) return null;

      const dirs = [
        { dx: 1, dy: 0 },
        { dx: -1, dy: 0 },
        { dx: 0, dy: 1 },
        { dx: 0, dy: -1 },
      ];

      const total = MAP_COLS * MAP_ROWS;
      const visited = new Array(total).fill(false);
      const prevX = new Array(total).fill(-1);
      const prevY = new Array(total).fill(-1);
      const queue = [];
      let head = 0;

      const toIndex = (x, y) => y * MAP_COLS + x;
      const startIndex = toIndex(startX, startY);
      const targetIndex = toIndex(targetX, targetY);

      visited[startIndex] = true;
      queue.push({ x: startX, y: startY });

      while (head < queue.length) {
        const current = queue[head++];

        if (current.x === targetX && current.y === targetY) break;

        for (const d of dirs) {
          const nx = current.x + d.dx;
          const ny = current.y + d.dy;
          if (nx < 0 || ny < 0 || nx >= MAP_COLS || ny >= MAP_ROWS) continue;

          const ni = toIndex(nx, ny);
          if (visited[ni]) continue;

          const isStart = nx === startX && ny === startY;
          if (!isStart && !isWalkableTile(nx, ny)) continue;

          visited[ni] = true;
          prevX[ni] = current.x;
          prevY[ni] = current.y;
          queue.push({ x: nx, y: ny });
        }
      }

      if (!visited[targetIndex]) return null;

      const steps = [];
      let cx = targetX;
      let cy = targetY;
      while (!(cx === startX && cy === startY)) {
        const i = toIndex(cx, cy);
        const px = prevX[i];
        const py = prevY[i];
        if (px === -1 || py === -1) return null;
        steps.push({ dx: cx - px, dy: cy - py });
        cx = px;
        cy = py;
      }

      steps.reverse();
      return steps;
    }

    class Entity {
      constructor(gridX, gridY, size = TILE_SIZE * 0.78) {
        this.size = size;
        this.x = gridX * TILE_SIZE + (TILE_SIZE - size) / 2;
        this.y = gridY * TILE_SIZE + (TILE_SIZE - size) / 2;
      }

      get gridX() {
        return Math.floor((this.x + this.size / 2) / TILE_SIZE);
      }

      get gridY() {
        return Math.floor((this.y + this.size / 2) / TILE_SIZE);
      }

      hitRect(other) {
        return (
          this.x < other.x + other.size &&
          this.x + this.size > other.x &&
          this.y < other.y + other.size &&
          this.y + this.size > other.y
        );
      }
    }

    class Player extends Entity {
      constructor() {
        super(1, 1, TILE_SIZE * 0.8);
        this.alive = true;
        this.targetX = this.x;
        this.targetY = this.y;
        this.moving = false;
        this.moveCooldown = 0;
        this.pathQueue = [];
        this.bombsPlaced = 0;
        this.invincible = 0;
      }

      get speed() {
        return 2.2 + playerStats.speedTier * 0.25;
      }

      update() {
        if (!this.alive) return;

        if (this.invincible > 0) this.invincible -= 1;
        if (this.moveCooldown > 0) this.moveCooldown -= 1;

        if (this.moving) {
          const dx = this.targetX - this.x;
          const dy = this.targetY - this.y;
          const dist = Math.hypot(dx, dy);
          if (dist <= this.speed) {
            this.x = this.targetX;
            this.y = this.targetY;
            this.moving = false;
            this.moveCooldown = Math.max(6, 14 - playerStats.speedTier * 2);
          } else {
            this.x += (dx / dist) * this.speed;
            this.y += (dy / dist) * this.speed;
          }
        }

        if (!this.moving && this.moveCooldown <= 0) {
          let dx = 0;
          let dy = 0;
          if (input.up) dy = -1;
          else if (input.down) dy = 1;
          else if (input.left) dx = -1;
          else if (input.right) dx = 1;
          if (dx || dy) {
            this.pathQueue = [];
            destinationMarker = null;
            this.tryMove(dx, dy);
          } else if (this.pathQueue.length > 0) {
            const next = this.pathQueue.shift();
            if (!next || !this.tryMove(next.dx, next.dy)) {
              this.pathQueue = [];
              destinationMarker = null;
            }
          }
        }

        if (!this.moving && this.pathQueue.length === 0 && destinationMarker?.reachable) {
          if (this.gridX === destinationMarker.x && this.gridY === destinationMarker.y) {
            destinationMarker = null;
          }
        }

        if (input.bomb) {
          this.placeBomb();
          input.bomb = false;
        }

        for (let i = items.length - 1; i >= 0; i -= 1) {
          if (this.hitRect(items[i])) {
            const item = items[i];
            if (item.type === 'bomb' && playerStats.bombCount < 4) playerStats.bombCount += 1;
            if (item.type === 'range' && playerStats.bombRange < 4) playerStats.bombRange += 1;
            if (item.type === 'speed' && playerStats.speedTier < 4) playerStats.speedTier += 1;
            if (item.type === 'heart' && playerStats.lives < 3) playerStats.lives += 1;
            score += 60;
            items.splice(i, 1);
            refreshHud();
          }
        }
      }

      tryMove(dx, dy) {
        const gx = this.gridX + dx;
        const gy = this.gridY + dy;
        if (!isWalkableTile(gx, gy)) return false;

        this.targetX = gx * TILE_SIZE + (TILE_SIZE - this.size) / 2;
        this.targetY = gy * TILE_SIZE + (TILE_SIZE - this.size) / 2;
        this.moving = true;
        return true;
      }

      setDestination(gridX, gridY) {
        if (!this.alive) return false;
        const startX = this.gridX;
        const startY = this.gridY;
        if (startX === gridX && startY === gridY) return false;

        const path = findShortestPath(startX, startY, gridX, gridY);
        if (!path || path.length === 0) return false;

        this.pathQueue = path;
        return true;
      }

      placeBomb() {
        if (this.bombsPlaced >= playerStats.bombCount) return;
        const gx = this.gridX;
        const gy = this.gridY;
        if (bombs.some((b) => b.gx === gx && b.gy === gy)) return;
        const placedAt = performance.now();
        bombs.push({
          gx,
          gy,
          owner: this,
          range: playerStats.bombRange,
          placedAt,
          explodeAt: placedAt + BOMB_FUSE_MS,
        });
        this.bombsPlaced += 1;
      }

      hurt() {
        if (!this.alive || this.invincible > 0) return;
        this.alive = false;
        playerStats.lives -= 1;
        refreshHud();
        if (playerStats.lives <= 0) {
          gameState = GAME_STATE.GAME_OVER;
          openOverlay();
          return;
        }
        setTimeout(() => {
          this.x = TILE_SIZE + (TILE_SIZE - this.size) / 2;
          this.y = TILE_SIZE + (TILE_SIZE - this.size) / 2;
          this.targetX = this.x;
          this.targetY = this.y;
          this.moving = false;
          this.pathQueue = [];
          this.alive = true;
          this.invincible = 170;
        }, 900);
      }

      draw() {
        if (!this.alive) return;
        if (this.invincible > 0 && Math.floor(this.invincible / 8) % 2 === 0) return;

        const cx = this.x + this.size / 2;
        const cy = this.y + this.size / 2;
        const bob = Math.sin(performance.now() / 160) * 0.8;

        ctx.shadowColor = 'rgba(250, 204, 21, 0.6)';
        ctx.shadowBlur = 12;

        const grad = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.size);
        grad.addColorStop(0, '#fef08a');
        grad.addColorStop(1, '#f59e0b');
        ctx.fillStyle = grad;
        roundedRectPath(this.x, this.y + bob, this.size, this.size, 10);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        roundedRectPath(this.x + 4, this.y + 4 + bob, this.size - 8, 7, 4);
        ctx.fill();

        // Distinct dark outline for contrast
        ctx.strokeStyle = '#7c2d12';
        ctx.lineWidth = 2.5;
        roundedRectPath(this.x, this.y + bob, this.size, this.size, 10);
        ctx.stroke();

        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(cx - 5, cy - 2 + bob, 3.2, 0, Math.PI * 2);
        ctx.arc(cx + 5, cy - 2 + bob, 3.2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#0f172a';
        ctx.beginPath();
        ctx.arc(cx - 5, cy - 2 + bob, 1.6, 0, Math.PI * 2);
        ctx.arc(cx + 5, cy - 2 + bob, 1.6, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#7c2d12';
        ctx.beginPath();
        ctx.arc(cx, cy + 1 + bob, 1.4, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = '#7c2d12';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy + 4 + bob, 5, 0.2, Math.PI - 0.2);
        ctx.stroke();

        // Small crown marker to make player instantly recognizable
        ctx.fillStyle = '#fde047';
        ctx.fillRect(cx - 6, this.y - 4 + bob, 12, 4);
        ctx.fillRect(cx - 4, this.y - 7 + bob, 2, 3);
        ctx.fillRect(cx, this.y - 8 + bob, 2, 4);
        ctx.fillRect(cx + 4, this.y - 7 + bob, 2, 3);
      }
    }

    class Enemy extends Entity {
      constructor(gridX, gridY, styleIndex = 0) {
        super(gridX, gridY, TILE_SIZE * 0.8);
        this.styleIndex = styleIndex;
        this.dir = [{ x: 0, y: 1 }, { x: 0, y: -1 }, { x: 1, y: 0 }, { x: -1, y: 0 }][Math.floor(Math.random() * 4)];
        this.cooldown = Math.floor(Math.random() * 64) + 28;
        this.alive = true;
      }

      update() {
        if (!this.alive) return;

        this.cooldown -= 1;
        if (this.cooldown <= 0) {
          const dirs = [
            this.dir,
            { x: 0, y: 1 },
            { x: 0, y: -1 },
            { x: 1, y: 0 },
            { x: -1, y: 0 },
          ];
          let moved = false;
          for (const d of dirs.sort(() => Math.random() - 0.5)) {
            if (this.tryMove(d.x, d.y)) {
              this.dir = d;
              moved = true;
              break;
            }
          }
          this.cooldown = moved ? Math.max(20, 34 - level) : 24;
        }

        if (player.alive && this.hitRect(player)) player.hurt();
      }

      tryMove(dx, dy) {
        const gx = this.gridX + dx;
        const gy = this.gridY + dy;
        if (gx < 0 || gy < 0 || gx >= MAP_COLS || gy >= MAP_ROWS) return false;
        if (map[gy][gx] === WALL || map[gy][gx] === BRICK) return false;
        if (bombs.some((b) => b.gx === gx && b.gy === gy)) return false;
        this.x = gx * TILE_SIZE + (TILE_SIZE - this.size) / 2;
        this.y = gy * TILE_SIZE + (TILE_SIZE - this.size) / 2;
        return true;
      }

      draw() {
        if (!this.alive) return;

        const theme = ENEMY_THEMES[this.styleIndex % ENEMY_THEMES.length];
        const cx = this.x + this.size / 2;
        const cy = this.y + this.size / 2;
        const bob = Math.sin((performance.now() + this.styleIndex * 120) / 210) * 0.9;

        ctx.shadowColor = `${theme.primary}66`;
        ctx.shadowBlur = 10;
        const grad = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.size);
        grad.addColorStop(0, theme.primary);
        grad.addColorStop(1, theme.secondary);
        ctx.fillStyle = grad;
        roundedRectPath(this.x, this.y + bob, this.size, this.size, 10);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.fillStyle = 'rgba(255,255,255,0.28)';
        roundedRectPath(this.x + 4, this.y + 4 + bob, this.size - 8, 6, 4);
        ctx.fill();

        ctx.fillStyle = theme.eye;
        ctx.fillRect(cx - 8, cy - 4 + bob, 5, 5);
        ctx.fillRect(cx + 3, cy - 4 + bob, 5, 5);

        ctx.fillStyle = '#0f172a';
        ctx.fillRect(cx - 7, cy - 3 + bob, 2, 2);
        ctx.fillRect(cx + 4, cy - 3 + bob, 2, 2);

        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx - 6, cy + 7 + bob);
        ctx.quadraticCurveTo(cx, cy + 11 + bob, cx + 6, cy + 7 + bob);
        ctx.stroke();
      }
    }

    function spawnExplosion(gx, gy, range, owner) {
      const cells = [{ x: gx, y: gy }];
      const dirs = [
        { x: 1, y: 0 },
        { x: -1, y: 0 },
        { x: 0, y: 1 },
        { x: 0, y: -1 },
      ];

      for (const d of dirs) {
        for (let r = 1; r <= range; r += 1) {
          const x = gx + d.x * r;
          const y = gy + d.y * r;
          if (x < 0 || y < 0 || x >= MAP_COLS || y >= MAP_ROWS) break;
          if (map[y][x] === WALL) break;
          cells.push({ x, y });
          if (map[y][x] === BRICK) {
            map[y][x] = TILE;
            score += 10;
            if (exit && exit.x === x && exit.y === y) exit.revealed = true;
            else if (Math.random() < 0.25) {
              const rItem = ['bomb', 'range', 'speed', 'heart'][Math.floor(Math.random() * 4)];
              items.push({ x: x * TILE_SIZE + TILE_SIZE * 0.15, y: y * TILE_SIZE + TILE_SIZE * 0.15, size: TILE_SIZE * 0.7, type: rItem, bob: 0 });
            }
            break;
          }
        }
      }

      explosions.push({ cells, timer: 24 });
      owner.bombsPlaced = Math.max(0, owner.bombsPlaced - 1);

      for (const c of cells) {
        const rect = { x: c.x * TILE_SIZE, y: c.y * TILE_SIZE, size: TILE_SIZE };

        if (player.alive && player.hitRect(rect)) player.hurt();

        for (const e of enemies) {
          if (e.alive && e.hitRect(rect)) {
            e.alive = false;
            score += 120;
          }
        }

        for (const b of bombs) {
          if (b.gx === c.x && b.gy === c.y) b.explodeAt = Math.min(b.explodeAt, performance.now() + 40);
        }
      }
      refreshHud();
    }

    function buildMap() {
      map = [];
      for (let y = 0; y < MAP_ROWS; y += 1) {
        const row = [];
        for (let x = 0; x < MAP_COLS; x += 1) {
          const border = x === 0 || y === 0 || x === MAP_COLS - 1 || y === MAP_ROWS - 1;
          const pillar = x % 2 === 0 && y % 2 === 0;
          if (border || pillar) row.push(WALL);
          else row.push(Math.random() < 0.69 ? BRICK : TILE);
        }
        map.push(row);
      }

      map[1][1] = TILE;
      map[1][2] = TILE;
      map[2][1] = TILE;

      const brickCells = [];
      for (let y = 1; y < MAP_ROWS - 1; y += 1) {
        for (let x = 1; x < MAP_COLS - 1; x += 1) {
          if (map[y][x] === BRICK) brickCells.push({ x, y });
        }
      }
      const pick = brickCells[Math.floor(Math.random() * brickCells.length)] || { x: MAP_COLS - 2, y: MAP_ROWS - 2 };
      exit = { x: pick.x, y: pick.y, revealed: false };
    }

    function spawnEnemies() {
      enemies = [];
      const count = 2 + level;
      const pool = [];
      for (let y = 1; y < MAP_ROWS - 1; y += 1) {
        for (let x = 1; x < MAP_COLS - 1; x += 1) {
          if (map[y][x] === TILE && (x > 4 || y > 4)) pool.push({ x, y });
        }
      }

      for (let i = 0; i < count && pool.length; i += 1) {
        const index = Math.floor(Math.random() * pool.length);
        const { x, y } = pool.splice(index, 1)[0];
        enemies.push(new Enemy(x, y, i + level));
      }
    }

    function refreshHud() {
      levelEl.textContent = `${level} / 10`;
      scoreEl.textContent = String(score);
      livesEl.textContent = '❤️'.repeat(Math.max(playerStats.lives, 0));
      enemyCountEl.textContent = String(enemies.filter((e) => e.alive).length);
    }

    function startLevel() {
      buildMap();
      player = new Player();
      bombs = [];
      explosions = [];
      items = [];
      spawnEnemies();
      refreshHud();
      gameState = GAME_STATE.PLAYING;
      overlay.style.display = 'none';
      canvas.focus();
    }

    function resetGame() {
      level = 1;
      score = 0;
      playerStats.lives = 3;
      playerStats.speedTier = 1;
      playerStats.bombCount = 1;
      playerStats.bombRange = 1;
      startLevel();
    }

    function openOverlay() {
      overlay.style.display = 'flex';
      if (gameState === GAME_STATE.START) {
        dialog.innerHTML = `
          <h2>怪獸塔爆爆冒險</h2>
          <p>重新包裝的手機版炸彈玩法：10 個關卡、怪獸塔怪獸登場。</p>
          <p>目標：炸掉障礙、擊敗全部怪獸，找到出口即可過關。</p>
          <button class="cta" id="startBtn">開始冒險</button>
        `;
      }

      if (gameState === GAME_STATE.LEVEL_CLEAR) {
        dialog.innerHTML = `
          <h2>第 ${level} 關完成！</h2>
          <p>準備進入下一關怪獸戰場...</p>
        `;
      }

      if (gameState === GAME_STATE.GAME_OVER) {
        dialog.innerHTML = `
          <h2>挑戰結束</h2>
          <p>最終分數：${score}</p>
          <button class="cta" id="restartBtn">重新挑戰</button>
        `;
      }

      if (gameState === GAME_STATE.GAME_WIN) {
        dialog.innerHTML = `
          <h2>全 10 關通關！</h2>
          <p>恭喜完成怪獸塔爆爆冒險！</p>
          <p>最終分數：${score}</p>
          <button class="cta" id="restartBtn">再玩一次</button>
        `;
      }

      document.getElementById('startBtn')?.addEventListener('click', resetGame);
      document.getElementById('restartBtn')?.addEventListener('click', resetGame);
    }

    function update() {
      if (gameState !== GAME_STATE.PLAYING) return;
      const now = performance.now();

      player.update();

      for (const e of enemies) e.update();
      enemies = enemies.filter((e) => e.alive);

      for (let i = bombs.length - 1; i >= 0; i -= 1) {
        if (now >= bombs[i].explodeAt) {
          const b = bombs.splice(i, 1)[0];
          spawnExplosion(b.gx, b.gy, b.range, b.owner);
        }
      }

      for (let i = explosions.length - 1; i >= 0; i -= 1) {
        explosions[i].timer -= 1;
        if (explosions[i].timer <= 0) explosions.splice(i, 1);
      }

      for (const item of items) item.bob += 0.08;

      refreshHud();

      if (enemies.length === 0 && exit.revealed) {
        const extRect = { x: exit.x * TILE_SIZE, y: exit.y * TILE_SIZE, size: TILE_SIZE };
        if (player.alive && player.hitRect(extRect)) {
          score += 500;
          if (level >= 10) {
            gameState = GAME_STATE.GAME_WIN;
            openOverlay();
          } else {
            level += 1;
            gameState = GAME_STATE.LEVEL_CLEAR;
            openOverlay();
            setTimeout(startLevel, 1000);
          }
        }
      }
    }

    function drawMap() {
      if (!Array.isArray(map) || map.length !== MAP_ROWS) {
        ctx.fillStyle = '#0e1b2f';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        return;
      }

      for (let y = 0; y < MAP_ROWS; y += 1) {
        for (let x = 0; x < MAP_COLS; x += 1) {
          const base = (x + y) % 2 === 0 ? '#183355' : '#1d3b63';
          ctx.fillStyle = base;
          ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);

          if (map[y][x] === WALL) {
            ctx.fillStyle = '#3b4e73';
            ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, 4);
          }

          if (map[y][x] === BRICK) {
            ctx.fillStyle = '#b45309';
            ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            ctx.strokeStyle = '#78350f';
            ctx.strokeRect(x * TILE_SIZE + 1, y * TILE_SIZE + 1, TILE_SIZE - 2, TILE_SIZE - 2);
          }
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawMap();

      if (destinationMarker) {
        const mx = destinationMarker.x * TILE_SIZE + TILE_SIZE / 2;
        const my = destinationMarker.y * TILE_SIZE + TILE_SIZE / 2;
        const pulse = 8 + Math.sin(performance.now() / 120) * 2.2;
        const color = destinationMarker.reachable ? 'rgba(34,197,94,0.9)' : 'rgba(239,68,68,0.92)';
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(mx, my, pulse + 8, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(mx - 5, my);
        ctx.lineTo(mx + 5, my);
        ctx.moveTo(mx, my - 5);
        ctx.lineTo(mx, my + 5);
        ctx.stroke();
      }

      if (exit?.revealed) {
        ctx.fillStyle = 'rgba(192, 132, 252, 0.85)';
        ctx.fillRect(exit.x * TILE_SIZE, exit.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 24px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('⇩', exit.x * TILE_SIZE + TILE_SIZE / 2, exit.y * TILE_SIZE + TILE_SIZE / 2 + 1);
      }

      for (const item of items) {
        const y = item.y + Math.sin(item.bob) * 2;
        ctx.fillStyle = '#34d399';
        ctx.fillRect(item.x, y, item.size, item.size);
        ctx.fillStyle = '#fff';
        ctx.font = '20px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const icon = item.type === 'bomb' ? '💣' : item.type === 'range' ? '🔥' : item.type === 'speed' ? '⚡' : '❤️';
        ctx.fillText(icon, item.x + item.size / 2, y + item.size / 2 + 1);
      }

      for (const b of bombs) {
        const x = b.gx * TILE_SIZE + TILE_SIZE / 2;
        const y = b.gy * TILE_SIZE + TILE_SIZE / 2;
        const elapsedMs = Math.max(0, performance.now() - b.placedAt);
        const fuseProgress = Math.min(1, elapsedMs / BOMB_FUSE_MS);
        const pulse = 14 + Math.sin(fuseProgress * 18) * 2;
        ctx.fillStyle = '#111827';
        ctx.beginPath();
        ctx.arc(x, y, pulse, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fef3c7';
        ctx.beginPath();
        ctx.arc(x - 4, y - 4, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      player?.draw();
      for (const e of enemies) e.draw();

      for (const exp of explosions) {
        const alpha = exp.timer / 24;
        for (const c of exp.cells) {
          const cx = c.x * TILE_SIZE + TILE_SIZE / 2;
          const cy = c.y * TILE_SIZE + TILE_SIZE / 2;
          const r = TILE_SIZE * 0.55;
          const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
          g.addColorStop(0, `rgba(255,244,174,${alpha})`);
          g.addColorStop(0.6, `rgba(250,204,21,${alpha * 0.9})`);
          g.addColorStop(1, 'rgba(251,146,60,0)');
          ctx.fillStyle = g;
          ctx.fillRect(c.x * TILE_SIZE, c.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
        }
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp') { input.up = true; e.preventDefault(); }
      if (e.key === 'ArrowDown') { input.down = true; e.preventDefault(); }
      if (e.key === 'ArrowLeft') { input.left = true; e.preventDefault(); }
      if (e.key === 'ArrowRight') { input.right = true; e.preventDefault(); }
      if (e.key === ' ') { input.bomb = true; e.preventDefault(); }
    });

    window.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowUp') input.up = false;
      if (e.key === 'ArrowDown') input.down = false;
      if (e.key === 'ArrowLeft') input.left = false;
      if (e.key === 'ArrowRight') input.right = false;
    });

    let touchStart = null;
    let lastTapAt = 0;
    let lastTapPos = null;

    canvas.addEventListener('pointerdown', (e) => {
      const { x, y } = getCanvasPointerPosition(e.clientX, e.clientY);

      touchStart = { x, y };
      canvas.setPointerCapture(e.pointerId);
    });

    canvas.addEventListener('pointerup', (e) => {
      if (!touchStart || gameState !== GAME_STATE.PLAYING) {
        touchStart = null;
        return;
      }

      const { x, y } = getCanvasPointerPosition(e.clientX, e.clientY);
      const movedDist = Math.hypot(x - touchStart.x, y - touchStart.y);
      const now = performance.now();

      // Ignore drag gestures for tap-to-move.
      if (movedDist <= 20) {
        let triggeredBomb = false;
        if (now - lastTapAt < 280 && lastTapPos) {
          const dist = Math.hypot(lastTapPos.x - x, lastTapPos.y - y);
          if (dist < 45) {
            input.bomb = true;
            triggeredBomb = true;
          }
        }

        if (!triggeredBomb && player?.alive) {
          const gx = Math.floor(x / TILE_SIZE);
          const gy = Math.floor(y / TILE_SIZE);
          const moved = player.setDestination(gx, gy);
          destinationMarker = {
            x: gx,
            y: gy,
            reachable: moved,
            ttl: moved ? -1 : 26,
          };
        }

        lastTapAt = now;
        lastTapPos = { x, y };
      }

      touchStart = null;
    });

    canvas.addEventListener('pointercancel', () => {
      touchStart = null;
    });

    bombBtn.addEventListener('click', () => {
      input.bomb = true;
      canvas.focus();
    });

    setInterval(() => {
      if (!destinationMarker) return;
      if (destinationMarker.ttl > 0) {
        destinationMarker.ttl -= 1;
        if (destinationMarker.ttl <= 0) destinationMarker = null;
      }
    }, 16);

    refreshHud();
    openOverlay();
    gameLoop();
  </script>
</body>
</html>
